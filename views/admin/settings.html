<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Lab Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="admin-body">
  <aside id="sidebar"></aside>
  <main class="admin-main">
    <div id="topbar" class="glass"></div>

    <section class="panel glass">
      <div class="panel-head"><h3><i class="fa-solid fa-gear"></i> General Settings</h3></div>
      <form id="settingsForm">
        <div class="field"><label>University Name</label><input id="universityName" maxlength="120" /></div>
        <div class="field"><label>Lab Name</label><input id="labName" maxlength="120" /></div>
        <div class="field"><label>Theme</label>
          <select id="theme"><option value="light">Light</option><option value="dark">Dark</option></select>
        </div>
        <div class="field"><label>Sync Interval (seconds)</label><input id="syncInterval" type="number" min="5" max="3600" /></div>
        <div class="field"><label>Backup Location</label><input id="backupLocation" maxlength="200" /></div>
        <div class="field"><label>Departments (comma separated)</label><textarea id="departments" rows="2" class="form-control"></textarea></div>
        <div class="field"><label>Years (comma separated)</label><textarea id="years" rows="2" class="form-control"></textarea></div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save Settings</button>
        </div>
      </form>
    </section>

    <section class="panel glass">
      <div class="panel-head"><h3><i class="fa-solid fa-lock"></i> Change Admin Password</h3></div>
      <form id="pwForm">
        <div class="field"><label>Current Password</label><input id="curPw" type="password" required /></div>
        <div class="field"><label>New Password (min 6 chars)</label><input id="newPw" type="password" required /></div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-success"><i class="fa-solid fa-key"></i> Update Password</button>
        </div>
      </form>
    </section>
  </main>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="/js/common.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
