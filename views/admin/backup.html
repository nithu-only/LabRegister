<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backup — Lab Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="admin-body">
  <aside id="sidebar"></aside>
  <main class="admin-main">
    <div id="topbar" class="glass"></div>

    <section class="panel glass">
      <div class="panel-head">
        <h3><i class="fa-solid fa-database"></i> Database Backups</h3>
        <div class="toolbar" style="margin:0 0 0 auto">
          <button class="btn btn-primary btn-sm" id="backupNow"><i class="fa-solid fa-download"></i> Backup Now</button>
        </div>
      </div>
      <p class="sub" style="color:var(--text-soft)">Nightly backups run automatically at the scheduled time. A backup is a full copy of the local SQLite database.</p>

      <div class="table-wrap">
        <table class="data" id="tbl">
          <thead>
            <tr>
              <th data-sort="name">File</th>
              <th data-sort="sizeKb">Size (KB)</th>
              <th data-sort="createdAt">Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="4" class="spinner-center"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="/js/common.js"></script>
  <script src="/js/backup.js"></script>
</body>
</html>
