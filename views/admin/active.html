<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Active Now — Lab Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="admin-body">
  <aside id="sidebar"></aside>
  <main class="admin-main">
    <div id="topbar" class="glass"></div>

    <section class="panel glass">
      <div class="panel-head">
        <h3><i class="fa-solid fa-person-walking"></i> Students Inside Right Now</h3>
        <div class="toolbar" style="margin:0 0 0 auto">
          <span id="count" class="admin-chip"><i class="fa-solid fa-users"></i> 0 inside</span>
          <button class="btn btn-ghost btn-sm" id="refresh"><i class="fa-solid fa-rotate"></i> Refresh</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data" id="tbl">
          <thead>
            <tr>
              <th data-sort="name">Name</th>
              <th data-sort="registerNumber">Register No</th>
              <th data-sort="department">Department</th>
              <th data-sort="year">Year</th>
              <th data-sort="loginTime">Logged In At</th>
              <th data-sort="duration">Duration</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="7" class="spinner-center"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="/js/common.js"></script>
  <script src="/js/active.js"></script>
</body>
</html>
