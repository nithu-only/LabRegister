<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Lab Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/vendor/font-awesome/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="admin-body">
  <aside id="sidebar"></aside>
  <main class="admin-main">
    <div id="topbar" class="glass"></div>

    <div class="cards-grid" id="cards">
      <div class="stat-card glass"><div class="spinner-center" style="padding:10px"><span class="spinner"></span></div></div>
    </div>

    <section class="panel glass">
      <div class="panel-head"><h3><i class="fa-solid fa-chart-line"></i> Analytics Overview</h3></div>
      <div class="charts-grid">
        <div class="chart-card glass"><h4>Daily Visitors (30 days)</h4><div class="chart-box"><canvas id="chDaily"></canvas></div></div>
        <div class="chart-card glass"><h4>Department-wise Usage</h4><div class="chart-box"><canvas id="chDept"></canvas></div></div>
        <div class="chart-card glass"><h4>Year-wise Usage</h4><div class="chart-box"><canvas id="chYear"></canvas></div></div>
        <div class="chart-card glass"><h4>Peak Hours</h4><div class="chart-box"><canvas id="chPeak"></canvas></div></div>
        <div class="chart-card glass"><h4>Monthly Sessions (12 mo)</h4><div class="chart-box"><canvas id="chMonthly"></canvas></div></div>
      </div>
    </section>
  </main>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
