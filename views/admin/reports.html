<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports â€” Lab Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/vendor/font-awesome/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="admin-body">
  <aside id="sidebar"></aside>
  <main class="admin-main">
    <div id="topbar" class="glass"></div>

    <section class="panel glass">
      <div class="panel-head">
        <h3><i class="fa-solid fa-chart-pie"></i> Attendance Report</h3>
        <div class="toolbar" style="margin:0 0 0 auto">
          <select id="preset">
            <option value="today">Today</option>
            <option value="yesterday">Yesterday</option>
            <option value="week">Last 7 days</option>
            <option value="month" selected>Last 30 days</option>
          </select>
          <select id="fDept"></select>
          <select id="fYear"></select>
          <input id="regNo" type="text" placeholder="Register No (optional)" />
          <button class="btn btn-ghost btn-sm" id="expCsv"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
        </div>
      </div>

      <div class="quick-export">
        <span class="qe-label">Quick downloads:</span>
        <button class="btn btn-primary btn-sm" id="expWeekly"><i class="fa-solid fa-calendar-week"></i> Weekly (Excel)</button>
        <button class="btn btn-primary btn-sm" id="expMonthly"><i class="fa-solid fa-calendar"></i> Monthly (Excel)</button>
        <button class="btn btn-ghost btn-sm" id="expWeeklyCsv"><i class="fa-solid fa-file-csv"></i> Weekly CSV</button>
        <button class="btn btn-ghost btn-sm" id="expMonthlyPdf"><i class="fa-solid fa-file-pdf"></i> Monthly PDF</button>
      </div>

      <div id="summary" class="cards-grid" style="margin-bottom:18px"></div>

      <div class="table-wrap">
        <table class="data" id="tbl">
          <thead>
            <tr>
              <th data-sort="registerNumber">Register No</th>
              <th data-sort="name">Name</th>
              <th data-sort="department">Department</th>
              <th data-sort="year">Year</th>
              <th data-sort="daysPresent">Days Present</th>
              <th data-sort="visits">Total Visits</th>
              <th data-sort="totalHours">Total Hours</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="7" class="spinner-center"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="/js/common.js"></script>
  <script src="/js/reports.js"></script>
</body>
</html>
