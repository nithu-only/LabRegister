<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessions â€” Lab Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/vendor/font-awesome/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="admin-body">
  <aside id="sidebar"></aside>
  <main class="admin-main">
    <div id="topbar" class="glass"></div>

    <section class="panel glass">
      <div class="panel-head">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Sessions</h3>
        <div class="toolbar" style="margin:0 0 0 auto">
          <select id="preset">
            <option value="today">Today</option>
            <option value="yesterday">Yesterday</option>
            <option value="week">Last 7 days</option>
            <option value="month">Last 30 days</option>
            <option value="custom">Custom range</option>
          </select>
          <input type="date" id="dateFrom" class="hidden" />
          <input type="date" id="dateTo" class="hidden" />
          <select id="fDept"></select>
          <select id="fYear"></select>
          <select id="fStatus">
            <option value="">All Status</option>
            <option value="ACTIVE">Active</option>
            <option value="COMPLETED">Completed</option>
          </select>
          <input id="search" type="text" placeholder="Search USN / name" />
          <button class="btn btn-success btn-sm" id="expExcel"><i class="fa-solid fa-file-excel"></i> Excel</button>
          <button class="btn btn-ghost btn-sm" id="expCsv"><i class="fa-solid fa-file-csv"></i> CSV</button>
          <button class="btn btn-danger btn-sm" id="expPdf"><i class="fa-solid fa-file-pdf"></i> PDF</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data" id="tbl">
          <thead>
            <tr>
              <th data-sort="registerNumber">Register No</th>
              <th data-sort="name">Name</th>
              <th data-sort="department">Department</th>
              <th data-sort="year">Year</th>
              <th data-sort="loginTime">Login</th>
              <th data-sort="logoutTime">Logout</th>
              <th data-sort="duration">Duration</th>
              <th data-sort="status">Status</th>
              <th data-sort="date">Date</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="9" class="spinner-center"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pager"></div>
    </section>
  </main>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="/js/common.js"></script>
  <script src="/js/sessions.js"></script>
</body>
</html>
