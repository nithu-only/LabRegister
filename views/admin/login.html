<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login â€” Lab Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/vendor/font-awesome/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <div class="auth-body">
    <form class="auth-card glass" id="loginForm">
      <div class="auth-logo"><i class="fa-solid fa-user-shield"></i></div>
      <h1 id="authUniName">Srinivas University</h1>
      <p class="sub" id="brandSub">Computer Laboratory Register</p>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="btn btn-primary btn-lg" type="submit" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
      <div class="auth-error" id="err"></div>
      <a class="auth-back" href="/"><i class="fa-solid fa-house"></i> Back to Kiosk Home</a>
    </form>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
