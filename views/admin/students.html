<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students — Lab Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="admin-body">
  <aside id="sidebar"></aside>
  <main class="admin-main">
    <div id="topbar" class="glass"></div>

    <section class="panel glass">
      <div class="panel-head">
        <h3><i class="fa-solid fa-users"></i> Students</h3>
        <div class="toolbar" style="margin:0 0 0 auto">
          <input id="search" type="text" placeholder="Search name / USN" />
          <select id="fDept"></select>
          <select id="fYear"></select>
          <button class="btn btn-ghost btn-sm" id="importBtn"><i class="fa-solid fa-file-import"></i> Import</button>
          <input type="file" id="importFile" accept=".xlsx,.xls,.csv" class="hidden" />
        </div>
      </div>

      <div class="table-wrap">
        <table class="data" id="tbl">
          <thead>
            <tr>
              <th data-sort="registerNumber">Register No</th>
              <th data-sort="name">Name</th>
              <th data-sort="department">Department</th>
              <th data-sort="year">Year</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="5" class="spinner-center"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pager"></div>
    </section>
  </main>

  <!-- Add / Edit modal -->
  <div class="modal-overlay" id="formModal">
    <div class="modal glass">
      <button type="button" class="modal-close" data-close aria-label="Close">&times;</button>
      <h3 id="formTitle"><i class="fa-solid fa-user-plus"></i> Add Student</h3>
      <form id="form">
        <input type="hidden" id="f_id" />
        <div class="field"><label>Register Number</label><input id="f_registerNumber" maxlength="20" required /></div>
        <div class="field"><label>Full Name</label><input id="f_name" maxlength="100" required /></div>
        <div class="field"><label>Department</label><select id="f_department" required></select></div>
        <div class="field"><label>Year</label><select id="f_year" required></select></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="formCancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="/js/common.js"></script>
  <script src="/js/students.js"></script>
</body>
</html>
